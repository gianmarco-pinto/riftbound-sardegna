# Scheduled rankings refresh: discover -> ingest (capped) -> standings ->
# rate -> build shards -> publish to Supabase. Pipeline state (SQLite DB)
# persists between runs as assets of the "state" GitHub Release (2GB/file,
# free) — Supabase's old private "state" bucket is read once as a migration
# fallback.
#
# Scope without code changes:
#   repo variables DISCOVER_SCOPE (it|eu|world) and INGEST_COUNTRIES
#   ("IT" | "IT,FR,..." | "*" = worldwide), overridable per-dispatch via inputs.
#
# Required repo secrets: UVS_TOKEN, SUPABASE_URL, SUPABASE_SERVICE_KEY.

name: refresh-rankings

on:
  schedule:
    # 02:23 UTC = 04:23 Italy (CEST) — overnight, off the busy top-of-hour slot.
    - cron: "23 */2 * * *"
  workflow_dispatch:
    inputs:
      max_events:
        description: "Max events to ingest this run"
        default: "800"
      scope:
        description: "Discovery scope (it|eu|world)"
        default: ""
      countries:
        description: "Ingest countries (IT | IT,FR | * for worldwide)"
        default: ""
      full_profiles:
        description: "Force a FULL profile sweep (all players) this run — set to 'true'"
        default: ""

permissions:
  contents: write   # state release assets
  issues: write     # probe-pairings + live-token alert open/close issues

concurrency:
  group: refresh-rankings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      # build-site holds the whole worldwide dataset in memory (168k players, 141k
      # event shards, snapshot series); it outgrew Node's ~4GB default heap and
      # OOM'd (exit 134). The runner has 16GB — give Node 12GB of headroom.
      NODE_OPTIONS: --max-old-space-size=12288
      GH_TOKEN: ${{ github.token }}
      UVS_TOKEN: ${{ secrets.UVS_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      DISCOVER_SCOPE: ${{ github.event.inputs.scope || vars.DISCOVER_SCOPE || 'it' }}
      DISCOVER_LOOKBACK_DAYS: ${{ vars.DISCOVER_LOOKBACK_DAYS || '' }}
      INGEST_COUNTRIES: ${{ github.event.inputs.countries || vars.INGEST_COUNTRIES || 'IT' }}
      MAX_EVENTS: ${{ github.event.inputs.max_events || vars.MAX_EVENTS || '800' }}
      MAX_STANDINGS: ${{ vars.MAX_STANDINGS || '6000' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Download state (release)
        run: |
          mkdir -p data
          if gh release view state >/dev/null 2>&1; then
            echo "state release exists — downloading"
            gh release download state --dir data --clobber
            if [ ! -f data/riftbound.db ]; then
              echo "::error::state release exists but riftbound.db missing after download — ABORTING (refusing to fall back to a stale DB and overwrite good state)"
              exit 1
            fi
          else
            echo "no state release yet — one-time bootstrap from Supabase"
            node src/state.mjs download || true
          fi
          touch data/last-full-profiles.txt
      # Shrink guard: if the loaded DB is drastically smaller than the last known-good
      # baseline, the download/fallback gave us stale/corrupt state — abort BEFORE we
      # build, publish, or overwrite anything. The .state-ok marker gates the upload.
      - name: Guard — abort if loaded DB shrank vs last good
        run: node src/state-guard.mjs check && touch data/.state-ok
      - name: Discover events
        run: node src/discover.mjs
      # Match RESULTS now come from the PUBLIC registrations endpoint (player records
      # + final standings), since UVS locked the exact-pairings endpoint (get_all_rounds,
      # 403) ~2026-06-19. No token needed. Historical exact pairings stay frozen but intact.
      - name: Ingest results (registrations)
        run: node src/ingest-registrations.mjs
      - name: Probe — did UVS reopen exact pairings?
        run: node src/probe-pairings.mjs
        continue-on-error: true
      # Recover EXACT pairings for the post-lockdown GAP (events with standings but
      # no matches) from the authenticated hydraproxy backend — the same one the
      # locator website uses. Auto-picks the gap (eventsNeedingPairings). Once an
      # event's real matches land, rate.mjs rates it exactly and Phase B drops out
      # (rate-evolve skips events that have matches). continue-on-error so an expired
      # session token can NEVER break the pipeline — it just pauses pairing recovery
      # (the next step raises an alert) and new events fall back to the Phase-B estimate.
      - name: Ingest live pairings (gap recovery)
        continue-on-error: true
        env:
          LIVE_TOKEN: ${{ secrets.LIVE_TOKEN }}
          PROBE_TOKEN: ${{ secrets.PROBE_TOKEN }}
          PAIRINGS_MAX: ${{ vars.PAIRINGS_MAX || '150' }}
          # Backfill floor: only events on/after this date are eligible for pairing
          # recovery. Tunable via repo var to widen the window and recover older
          # placements-only events the pre-lockdown pipeline missed.
          SINCE_DATE: ${{ vars.PAIRINGS_SINCE || '2026-06-01' }}
        run: node src/ingest-pairings.mjs
      # Token-health alert: ingest-pairings writes data/token-status (ok|expired|
      # unknown). On "expired" open a GitHub issue (assigned → email notification);
      # on "ok" auto-close it. The session token expires, so this is how we learn.
      - name: Live-token health alert
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(cat data/token-status 2>/dev/null || echo unknown)
          echo "live-token status: $STATUS"
          OPEN=$(gh issue list --state open --search "LIVE_TOKEN in:title" --json number -q '.[0].number // empty' 2>/dev/null || echo "")
          if [ "$STATUS" = "expired" ]; then
            echo "::warning::LIVE_TOKEN expired — live-pairings ingest paused (new events use the Phase-B estimate)."
            if [ -z "$OPEN" ]; then
              gh issue create \
                --title "⚠️ LIVE_TOKEN scaduto — ingest pairing in pausa" \
                --body $'@gianmarco-pinto il token di sessione (secret **LIVE_TOKEN**, fallback PROBE_TOKEN) è scaduto: il recupero dei pairing live è in pausa e i nuovi eventi usano la stima Fase B finché non lo rinnovi.\n\n**Come risolvere (2 minuti):**\n1. Apri https://locator.riftbound.uvsgames.com da loggato.\n2. DevTools → Network → una richiesta a `api.cloudflare.riftbound.uvsgames.com` → Request Headers → copia il valore di `authorization` (`Token <hex>`).\n3. Settings → Secrets and variables → Actions → aggiorna il secret **LIVE_TOKEN**.\n4. Questa issue si chiude da sola al prossimo run riuscito.\n\n(Non incollare il token in chat — solo nel secret.)' \
                && echo "alert issue opened" || echo "issue create failed (non-fatal)"
            else
              echo "alert issue already open (#$OPEN) — not duplicating"
            fi
          elif [ "$STATUS" = "ok" ] && [ -n "$OPEN" ]; then
            gh issue close "$OPEN" --comment "Token valido di nuovo ✓ — ingest pairing ripreso." && echo "closed alert issue #$OPEN" || true
          fi
      # Legacy pairing ingest + round-standings are kept in the repo (frozen) in case
      # UVS reopens get_all_rounds; not run anymore (they 403).
      - name: Compute ratings
        run: node src/rate.mjs
      # Phase B: evolve the frozen rating with placement-only (post-lockdown) events.
      - name: Evolve rating (Phase B)
        run: node src/rate-evolve.mjs
      # Heavy full-profile regeneration (~150k shards) runs at most once per ~day;
      # every other run only refreshes leaderboard + IT profiles (the search index
      # is always full, built separately). Keeps frequent runs fast.
      - name: Decide profile scope (full once/day, light otherwise)
        run: |
          HRS=20
          F=data/last-full-profiles.txt
          NOW=$(date +%s); LAST=$(cat "$F" 2>/dev/null || echo 0)
          if [ "${{ github.event.inputs.full_profiles }}" = "true" ]; then
            echo "→ FULL profile sweep this run (forced via full_profiles input)"
            echo "PROFILE_SCOPES=" >> "$GITHUB_ENV"
            echo "$NOW" > "$F"
          elif [ $(( NOW - LAST )) -ge $(( HRS * 3600 )) ]; then
            echo "→ FULL profile sweep this run (all players)"
            echo "PROFILE_SCOPES=" >> "$GITHUB_ENV"
            echo "$NOW" > "$F"
          else
            echo "→ light profiles this run (leaderboard players + ${{ vars.PROFILE_SCOPES_LIGHT || 'it' }})"
            echo "PROFILE_SCOPES=${{ vars.PROFILE_SCOPES_LIGHT || 'it' }}" >> "$GITHUB_ENV"
          fi
      - name: Build site shards
        run: node src/build-site.mjs
      # Inject prevRank into the built shards (weekly position-movement arrows).
      - name: Inject rank arrows
        run: node src/rank-arrows.mjs
      # Publish global aggregate counts for the homepage stat bar.
      - name: Site stats
        run: node src/site-stats.mjs
      - name: Publish to Supabase
        run: node src/publish-supabase.mjs
      - name: Upload state (release)
        if: always()
        run: |
          # Marker gate: if the shrink guard didn't pass, NEVER upload — that would
          # overwrite the last good state with a stale/corrupt DB (the 2026-06 bug).
          if [ ! -f data/.state-ok ]; then
            echo "state guard did not pass — SKIPPING state upload to protect the last good state"
            exit 0
          fi
          gh release view state >/dev/null 2>&1 || gh release create state --title "pipeline state" --notes "SQLite DB and caches persisted between refresh runs. Machine-managed." --latest=false
          touch data/publish-manifest-r2.json data/publish-stats.json data/rank-history.json
          node src/state-guard.mjs update   # refresh the known-good baseline from this DB
          gh release upload state data/riftbound.db data/state-stats.json data/publish-stats.json data/rank-history.json data/nicknames-resolved.json data/publish-manifest.json data/publish-manifest-r2.json data/last-full-profiles.txt --clobber
          # Versioned backups: keep one dated snapshot per UTC day, retain the last 7,
          # so a corrupt overwrite is always recoverable in ~1 minute.
          DAY=$(date -u +%Y%m%d)
          if ! gh release view state --json assets -q '.assets[].name' | grep -qx "riftbound-$DAY.db"; then
            cp data/riftbound.db "data/riftbound-$DAY.db"
            gh release upload state "data/riftbound-$DAY.db"
            rm -f "data/riftbound-$DAY.db"
            { gh release view state --json assets -q '.assets[].name' | grep -E '^riftbound-[0-9]{8}\.db$' | sort | head -n -7 | while read -r a; do gh release delete-asset state "$a" -y; done; } || true
          fi
      # GitHub's scheduled cron is best-effort and silently skips firings under
      # load, which can stall a backfill for hours. While a large backlog remains,
      # re-trigger the next run ourselves so progress never depends on the cron.
      # Requires a WORKFLOW_PAT secret (Actions: read+write) — GITHUB_TOKEN cannot
      # re-trigger workflows. If the secret is absent the step is a no-op.
      # Self-chain only for a GENUINE large backlog. Steady state keeps ~6k recent
      # events pending by design (they have no published results yet and are retried
      # for up to GIVE_UP_DAYS), so the threshold sits above that buffer — otherwise
      # the chain would loop forever doing ~nothing. Normal incremental updates ride
      # the 2h cron; the chain only kicks in after a big drop-in (e.g. a tournament
      # weekend dumps thousands of new events at once).
      # GitHub's scheduled cron is best-effort and silently skips firings (observed
      # 5h gaps), which staled recent results. Two self-chain triggers keep data
      # current WITHOUT depending on the cron:
      #   (a) large backlog (> 8000) — a big drop-in (tournament-weekend dump);
      #   (b) FRESH concluded events whose results we haven't fetched yet
      #       (status='complete' AND results_at IS NULL). Self-limiting: every
      #       processed event gets results_at stamped (even empty standings) so it
      #       leaves the count → converges, no infinite loop. Threshold avoids
      #       chaining for a trivial trickle.
      # Gated on success() (NOT always()): a failed run must NOT re-trigger itself,
      # or it would loop on a persistent failure / pile up runs.
      - name: Self-chain (large backlog OR fresh unfetched results) — cron-independent freshness
        if: success()
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          FRESH_CHAIN_MIN: ${{ vars.FRESH_CHAIN_MIN || '50' }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "WORKFLOW_PAT not set — self-chain disabled (relying on cron)"; exit 0; fi
          PENDING=$(node -e "import('node:sqlite').then(({DatabaseSync})=>{const db=new DatabaseSync('data/riftbound.db');console.log(db.prepare('SELECT COUNT(*) c FROM events WHERE ingested_at IS NULL AND date < ?').get(new Date().toISOString()).c);}).catch(()=>console.log(0))")
          FRESH=$(node -e "import('node:sqlite').then(({DatabaseSync})=>{const db=new DatabaseSync('data/riftbound.db');console.log(db.prepare(\"SELECT COUNT(*) c FROM events WHERE status='complete' AND results_at IS NULL AND date < ?\").get(new Date().toISOString()).c);}).catch(()=>console.log(0))")
          echo "pending past events: $PENDING | fresh concluded-unfetched: $FRESH (threshold $FRESH_CHAIN_MIN)"
          if [ "${PENDING:-0}" -gt 8000 ]; then
            echo "large backlog (> 8000) → re-triggering next run (cron-independent)"
            gh workflow run refresh.yml -f max_events=12000
          elif [ "${FRESH:-0}" -gt "${FRESH_CHAIN_MIN:-50}" ]; then
            echo "fresh concluded events ($FRESH > $FRESH_CHAIN_MIN) with results not yet fetched → re-triggering to stay current"
            gh workflow run refresh.yml
          else
            echo "nothing to chain → next update rides the 2h cron"
          fi
