<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Riftbound Ranking — Sardegna</title>
<style>
  :root{
    --bg:#0b1622; --panel:#13243a; --panel2:#0f1d30; --line:#21364f;
    --txt:#e8eef6; --dim:#8aa2bd; --accent:#f0a020; --accent2:#3aa0ff;
    --win:#39d98a; --loss:#ff6b6b; --draw:#c9b25a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#16304d 0%,var(--bg) 60%);
    color:var(--txt);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh}
  a{color:inherit;text-decoration:none}
  header{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line)}
  .logo{width:30px;height:30px;border-radius:50%;background:
    conic-gradient(from 0deg,var(--accent),#b5651d,var(--accent));flex:0 0 auto}
  header h1{font-size:18px;margin:0;letter-spacing:.3px}
  header .sub{color:var(--dim);font-size:12px}
  main{max-width:920px;margin:0 auto;padding:22px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  select,input{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:9px 12px;font-size:14px}
  input{flex:1;min-width:160px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:#18293f}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .elo{font-weight:700;color:var(--accent)}
  .rd{color:var(--dim);font-size:12px}
  .badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:#3a2a10;color:var(--accent);margin-left:6px;vertical-align:middle}
  .rank{color:var(--dim);width:34px}
  .back{color:var(--accent2);font-size:14px;display:inline-block;margin-bottom:14px}
  .phead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px}
  .phead h2{margin:0;font-size:24px}
  .pbig{font-size:30px;font-weight:800;color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .card h3{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--dim)}
  .card .big{font-size:20px;font-weight:700}
  .muted{color:var(--dim);font-size:13px}
  .w{color:var(--win)}.l{color:var(--loss)}.d{color:var(--draw)}
  .reslist{list-style:none;margin:0;padding:0}
  .reslist li{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .reslist li:last-child{border:0}
  .res{font-weight:700;width:18px;text-align:center}
  svg{width:100%;height:160px;display:block}
  .chart{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 4px}
  .foot{color:var(--dim);font-size:12px;margin-top:24px;text-align:center}
  .nores{color:var(--dim);padding:18px}
</style>
</head>
<body>
<header>
  <div class="logo"></div>
  <div>
    <h1>Riftbound Ranking</h1>
    <div class="sub" id="subtitle">Classifica giocatori · Sardegna</div>
  </div>
</header>
<main id="app"><p class="nores">Caricamento…</p></main>
<script src="app.js"></script>
</body>
</html>
